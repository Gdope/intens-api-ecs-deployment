name: CI - Tests

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  maven_test:
    name: Run Maven Tests
    runs-on: ubuntu-latest

    env:
      PORT: 8080

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "8"

      - name: Run tests
        run: mvn clean test
